<app-auth>

  <!-- Logo -->
  <img auth-logo src="assets/logo.png" width="70" />

  <!-- Title -->
  <span auth-title>Welcome Back</span>

  <!-- Description -->
  <span auth-desc>Please login to your account</span>

  <!-- Form -->
  <form auth-form>
    <div class="mb-3">
      <label>Email</label>
      <input type="email" class="form-control">
    </div>

    <div class="mb-3">
      <label>Password</label>
      <input type="password" class="form-control">
    </div>

    <button class="btn btn-primary w-100">Login</button>
  </form>

</app-auth>
