<section class="auth-container">
  <div class="auth-card bg-white d-flex flex-column align-items-center">
    <!----Auth Header------->
    <div class="w-100">
      <app-auth-header [title]="'Log In'" [description]="'Welcome Back! Please enter your details'" />
    </div>
    <!------------>

    <form class="w-100" [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <app-form-input [control]="getControl('email')" placeholder="Enter your Email"
        iconClass="fa-regular fa-envelope" />
      <!-- <div class="input-group mb-3">
        <span class="input-group-text" id="basic-addon1">
          <i class="fa-regular fa-envelope"></i>
        </span>
        <input type="email" class="form-control" placeholder="Enter your E-mail" aria-label="Email"
          aria-describedby="basic-addon1" formControlName="email">
      </div>

      <div class="alert alert-danger d-flex align-items-center" role="alert"
        *ngIf="loginForm.get('email')?.errors && loginForm.get('email')?.touched">
        <div *ngIf="loginForm.get('email')?.errors?.['required']">Email is required.</div>
        <div *ngIf="loginForm.get('email')?.errors?.['email']">Please enter a valid email address.</div>
      </div> -->
      <app-form-input [control]="getControl('password')" placeholder="Enter Your Password" iconClass="fa-solid fa-lock"
        [patternErrorMessage]="'Password must be at least 6 characters long and has upper, lower, (#$@4)'"
        [showToggle]="true" />
      <!-- <div class="input-group mb-3 position-relative">
        <span class="input-group-text">
          <i class="fa-solid fa-lock"></i>
        </span>

        <input [type]="showPassword ? 'text' : 'password'" class="form-control" placeholder="Password"
          formControlName="password" />


        <i class="fa-regular pass-icon" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'" (click)="togglePassword()"></i>
      </div>

      <div class="alert alert-danger d-flex align-items-center" role="alert"
        *ngIf="loginForm.get('password')?.errors && loginForm.get('password')?.touched">
        <div *ngIf="loginForm.get('password')?.errors?.['required']">Password is required.</div>
        <div *ngIf="loginForm.get('password')?.errors?.['pattern']">Password must be at least 6 characters long and has
          upper , lower , (#$@4).</div>
      </div> -->

      <div class="d-flex justify-content-between align-items-center mb-4">
        <a routerLink="/auth/register" class="text-decoration-none text-link auth-link">Register Now?</a>
        <a routerLink="/auth/forgot-password" class="text-decoration-none text-primary auth-link">Forgot Password?</a>
      </div>
      <div class="alert alert-danger d-flex align-items-center" role="alert" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="w-100"> <!--[disabled]="!loginForm.valid"-->
        <div class="spinner-border text-white" role="status" *ngIf="isLoading">
          <span class="visually-hidden">Loading...</span>
        </div>
        Login
      </button>
    </form>
  </div>
</section>
