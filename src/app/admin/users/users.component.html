<app-pages-header [title1]="'recipes'" [title2]="'items'"
  [description]="'You can now add your items that any user can order from the application and you can edit them'"></app-pages-header>

<section class="container">
  <div class="row align-items-center recipes-heading">
    <div class="col-lg-8">
      <div>
        <h2>Users Table Details</h2>
        <p class="py-0 my-0">You can check all details</p>
      </div>
    </div>
  </div>
</section>

<div class="filters">
  <div class="container">
    <div class="row">
      <div class="col-md-6 mb-2">
        <div class="w-100">
          <div class="input-group">
            <span class="input-group-text" id="basic-addon1"><i class="fa-solid fa-magnifying-glass"></i> </span>
            <input type="text" class="form-control" [(ngModel)]="name" (ngModelChange)="onSearchChange($event)"
              placeholder="Search Here with name .." aria-label="name" aria-describedby="basic-addon1">
          </div>
        </div>
      </div>

      <!-- <div class="col-md-3 mb-2">
        <ng-select [items]="tags" bindLabel="name" bindValue="id" placeholder="Select Tag" [(ngModel)]="selectedTagId"
          (ngModelChange)="onFilterChange()">
        </ng-select>
      </div> -->

      <!-- <div class="col-md-3 col-lg-2 mb-2">
        <ng-select [items]="categories" bindLabel="name" bindValue="id" placeholder="Select Category"
          [(ngModel)]="selectedCategoryId" (ngModelChange)="onFilterChange()" [virtualScroll]="true"
          [loading]="isCategoriesLoading" (scrollToEnd)="loadMoreCategories()">
        </ng-select>
      </div> -->
    </div>
  </div>
</div>

<!-- LOADER -->
<section class="my-4 text-center" *ngIf="isLoading">
  <app-loader></app-loader>
</section>

<!-- EMPTY STATE -->
<section class="my-4 text-center" *ngIf="!isLoading && users.length === 0">
  <app-empty-state></app-empty-state>
</section>

<!-- DATA -->
<section class="my-3" *ngIf="!isLoading && users.length > 0">
  <table class="table table-striped table-responsive mb-5">

    <thead>
      <tr>
        <th scope="col">User Name</th>
        <th scope="col">Image</th>
        <th scope="col">Email</th>
        <th scope="col">Country</th>
        <th scope="col">Phone Number</th>
        <th scope="col">Group</th>
        <th scope="col"></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users | paginate: {id:'users', itemsPerPage: pageSize,
      currentPage: pageNumber,
      totalItems: total}">
        <td> {{user?.userName}}</td>
        <td class="text-center align-middle">
          <div class="img-content ">
            <img [src]="assetUrl + user?.imagePath" (error)="onImageError($event)" [alt]="user?.userName">
          </div>
        </td>
        <td>{{user?.email}}</td>
         <td>{{ user?.country }}</td>
        <td>{{ user?.phoneNumber }}</td>
        <td>
          <span class="py-1 px-2 rounded-1"
                style="background-color: rgb(244, 248, 242);">
            {{ user?.group?.name }}
          </span>
        </td>
        <td>
          <div dropdown placement="bottom end" container="body">
            <!-- Trigger -->
            <div class="drop-down-toggler d-flex align-items-center justify-content-center" dropdownToggle>
              <i class="fa-solid fa-ellipsis-vertical"></i>
            </div>

            <!-- Menu -->
            <ul *dropdownMenu class="dropdown-menu sidebar-dropdown" role="menu">

              <!-- View -->
              <li role="menuitem">
                <a class="dropdown-item" (click)="onView(user)">
                  <i class="fa fa-eye me-2"></i> View
                </a>
              </li>

              <!-- Edit -->
              <li role="menuitem">
                <a class="dropdown-item" [routerLink]="'/dashboard/admin/recipes/edit/' + user.id">
                  <i class="fa fa-pen me-2"></i> Edit
                </a>
              </li>

              <!-- Delete -->
              <li role="menuitem">
                <a class="dropdown-item" (click)="openDeleteModal(user)">
                  <i class="fa fa-trash me-2"></i> Delete
                </a>
              </li>
            </ul>

          </div>
        </td>
      </tr>
    </tbody>
  </table>
</section>
<pagination-controls class="my-pagination" id="users" [directionLinks]="true" [autoHide]="false" [responsive]="true"
  (pageChange)="pageNumber = $event; loadUsers()">
</pagination-controls>
