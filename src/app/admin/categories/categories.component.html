<app-pages-header
  [title1]="'Categories'" [title2]="'items'"
  [description]="'You can now add your items that any user can order it from the Application and you can edit'"
></app-pages-header>

<section class="container">
  <div class="row align-items-center recipes-heading">
    <div class="col-lg-8">
      <div>
        <h2>Categories Table Details</h2>
        <p class="py-0 my-0">You can check all details</p>
      </div>
    </div>
    <div class="col-lg-4">
      <div class="button-container mt-4 mt-lg-0 w-100">
        <button class="add-button" (click)="onpenCategoryModal(false,false)">
          Add New Category
        </button>
      </div>
    </div>
  </div>
</section>

<div class="filters">
  <div class="container">
    <div class="row">
      <div class="col-md-6 mb-2">
        <div class="w-100">
          <div class="input-group">
            <span class="input-group-text" id="basic-addon1"><i class="fa-solid fa-magnifying-glass"></i> </span>
            <input type="text" class="form-control" [(ngModel)]="name" (ngModelChange)="onSearchChange($event)"
              placeholder="Search Here with name .." aria-label="name" aria-describedby="basic-addon1">
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- LOADER -->
<section class="my-4 text-center" *ngIf="isLoading">
  <app-loader></app-loader>
</section>

<!-- EMPTY STATE -->
<section class="my-4 text-center" *ngIf="!isLoading && categories.length === 0">
  <app-empty-state></app-empty-state>
</section>

<!-- DATA -->
<section class="my-3 table-responsive" *ngIf="!isLoading && categories.length > 0">
  <table class="table table-striped mb-5">
    <thead>
      <tr>
        <th scope="col">Id</th>
        <th scope="col">Name</th>
        <th scope="col">creation Date</th>
        <th scope="col">modification Date</th>
        <th scope="col">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let category of categories | paginate: {id:'categories', itemsPerPage: pageSize,
      currentPage: pageNumber,
      totalItems: total}">
      <td>{{category?.id}}</td>
        <td> {{category?.name}}</td>

        <td>{{category?.creationDate | date}}</td>
        <td>{{category?.modificationDate | date}}</td>
        <td>
          <div dropdown placement="bottom end" container="body">
            <!-- Trigger -->
            <div class="drop-down-toggler d-flex align-items-center justify-content-center" dropdownToggle>
              <i class="fa-solid fa-ellipsis-vertical"></i>
            </div>

            <!-- Menu -->
            <ul *dropdownMenu class="dropdown-menu sidebar-dropdown" role="menu">

              <!-- View -->
              <li role="menuitem">
                <a class="dropdown-item" (click)="onpenCategoryModal(false,true,category)">
                  <i class="fa fa-eye me-2"></i> View
                </a>
              </li>

              <!-- Edit -->
              <li role="menuitem">
                <a class="dropdown-item" (click)="onpenCategoryModal(true,false,category)">
                  <i class="fa fa-pen me-2"></i> Edit
                </a>
              </li>

              <!-- Delete -->
              <li role="menuitem">
                <a class="dropdown-item" (click)="openDeleteModal(category)">
                  <i class="fa fa-trash me-2"></i> Delete
                </a>
              </li>
            </ul>

          </div>
        </td>
      </tr>
    </tbody>
  </table>
</section>
  <pagination-controls class="my-pagination" id="categories" [directionLinks]="true" [autoHide]="false" [responsive]="true"
    (pageChange)="pageNumber = $event; loadCategories()">
  </pagination-controls>
