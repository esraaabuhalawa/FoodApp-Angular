<div class="modal-header d-flex justify-content-between align-items-center py-2">
  <h4 class="modal-title pull-left">{{ recipe.name }}</h4>

  <button type="button" class="cancel d-flex justify-content-center align-items-center text-danger border border-2 rounded-circle bg-transparent
   border-danger" (click)="cancel()">
    <i class="fa-solid fa-xmark text-danger fs-6"></i>
  </button>
</div>

<div class="modal-body d-flex align-items-center justify-content-center p-4">
  <div class="recipe-view-card d-flex flex-column gap-2">
    <!-- Image -->
    <div class="recipe-image">
      <img [src]="assetUrl + recipe.imagePath" [alt]="recipe.name" (error)="onImageError($event)">
      <span class="recipe-price-badge">
        {{ recipe.price }} EGP
      </span>
    </div>

    <!--body-->
    <div class="recipe-content">
      <h3 class="recipe-title mb-0">{{ recipe.name }}</h3>
      <div class="info-item" *ngIf="recipe.description">
        <p class="recipe-description">
          {{ recipe.description }}
        </p>
      </div>

      <div>
        <!-- Badges -->
        <div class="recipe-badges" *ngIf="recipe.tag || recipe.category?.length">
          <span class="badge-item" *ngIf="recipe.tag">
            <i class="ti ti-tag"></i> {{ recipe.tag.name }}
          </span>
          <span class="badge-item" *ngFor="let category of recipe.category">
            <i class="ti ti-category"></i> {{ category.name }}
          </span>
        </div>

        <!-- Dates -->
        <div class="recipe-dates">
          <div class="date-item">
            <span class="date-label">Created</span>
            <span class="date-value">{{ recipe.creationDate | date:'mediumDate' }}</span>
          </div>
          <div class="date-divider"></div>
          <div class="date-item">
            <span class="date-label">Updated</span>
            <span class="date-value">{{ recipe.modificationDate | date:'mediumDate' }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
