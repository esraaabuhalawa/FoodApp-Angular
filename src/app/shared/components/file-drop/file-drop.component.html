<div class="mb-3">
  <ngx-file-drop [accept]="accept" [dropZoneLabel]="label" (onFileDrop)="onFileDrop($event)">

  <ng-template ngx-file-drop-content-tmp let-openFileSelector="openFileSelector">
    <!-- Preview -->
    <div *ngIf="imagePreview; else uploadPrompt" class="position-relative mt-4">
      <img [src]="imagePreview" (error)="onImageError($event)" alt="preview" class="img-preview" />
      <button type="button" class="btn btn-sm btn-danger remove-btn mt-2" (click)="removeImage()">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <!-- Upload Prompt -->
    <ng-template #uploadPrompt>
      <div class="text-center">
        <i class="fa fa-cloud-upload fa-2x text-success"></i>
        <p class="mb-1 text-secondary">{{label}}</p>
        <p class="text-success mb-0">
          Drag & drop or
          <button type="button" class="btn btn-link browse-btn p-0" (click)="openFileSelector()">
            browse
          </button>
        </p>
      </div>
    </ng-template>
  </ng-template>
</ngx-file-drop>

<!-- Validation -->
<div *ngIf="isInvalid" class="text-danger mt-1">
  This Field is required.
</div>
</div>
